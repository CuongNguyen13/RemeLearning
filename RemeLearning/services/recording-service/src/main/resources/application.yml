spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: recording-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?currentSchema=reme_recording}
    username: ${DB_USERNAME:postgres.oaltfczuectbznkuywfm}
    password: ${DB_PASSWORD:Remelearning123!}
    schema: ${DB_SCHEMA:reme_recording}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: ${DB_SCHEMA:reme_recording}
    create-schemas: true
  servlet:
    multipart:
      max-file-size: ${RECORDING_MAX_FILE_SIZE:500MB}
      max-request-size: ${RECORDING_MAX_REQUEST_SIZE:500MB}

server:
  port: 8082

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

reme:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-minutes: 60
  s3:
    region: ${S3_REGION:ap-southeast-1}
    endpoint: ${S3_ENDPOINT:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    recording-bucket: ${S3_RECORDING_BUCKET:reme-recordings}
