      description: >
        One row in the merged grammar history list - either a "học thường" (learn) attempt or a
        "Thư viện" (library) session, normalized to one shape and tagged by source. Proxied
        verbatim from english-service.
      properties:
        source: { type: string, enum: [LEARN, LIBRARY] }
        attemptOrSessionId: { type: integer, format: int64 }
        completedAt: { type: string, format: date-time, nullable: true }
        score: { type: number, format: double, nullable: true }
        topicId: { type: integer, format: int64, nullable: true, description: "Only populated for LIBRARY rows." }

    ApiResponseGrammarHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { type: array, items: { $ref: "#/components/schemas/GrammarHistoryEntry" } }

