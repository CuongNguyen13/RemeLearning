              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingLibraryHistoryEntryList"

  /api/v1/learners/{userId}/learn/speaking/history/{attemptId}/ai-practice:
    post:
      tags: [Learners]
      summary: >
        Generate AI practice targeted at one specific past speaking attempt's mispronounced
        phonemes (the "Luyện tập với AI" history action); thin proxy to english-service
      operationId: generateSpeakingPracticeFromAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingPracticeItemList"
        "404":
          description: Attempt not found or doesn't belong to this learner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/learners/{userId}/learn/speaking/library/sections/{sectionId}/ai-practice:
    post:
      tags: [Learners]
      summary: >
        Generate AI practice targeted at this learner's own mispronunciations across every
        sentence attempt on one speaking-library section (the "Luyện tập với AI" action); thin
        proxy to english-service
      operationId: generateSpeakingPracticeFromSection
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingPracticeItemList"
        "404":
          description: No attempts on this section for this learner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/learners/{userId}/learn/speaking/merged-history:
    get:
      tags: [Learners]
      summary: >
        A learner's merged speaking history: "học thường" attempts + Thư viện sentence attempts in
        one time-sorted list, tagged by source; thin proxy to english-service
      operationId: getSpeakingMergedHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingHistoryEntryList"

components:
  schemas:
    User:
      type: object
      properties:
        userId: { type: string }
        email: { type: string }
        name: { type: string }
        role: { type: string }
        createdAt: { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string }
        password: { type: string }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    UpdateProfileRequest:
      type: object
      properties:
        name: { type: string }

    WeakPoint:
      type: object
      description: >
        Merged shape across english-service's three domain endpoints. category is stamped by
        bff-service itself (a literal "vocabulary"/"grammar"/"pronunciation") since each domain's
        own JSON carries a domain-specific type field instead of a shared category.
      properties:
        itemId: { type: string }
        label: { type: string }
        category: { type: string, enum: [vocabulary, grammar, pronunciation] }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }

    Recording:
      type: object
      properties:
        recordingId: { type: string }
        userId: { type: string }
        status: { type: string }
        s3Bucket: { type: string }
        s3Key: { type: string }
        createdAt: { type: string, format: date-time }

    Recommendation:
      type: object
      properties:
        itemId: { type: string }
        category: { type: string }
        label: { type: string }
        forgettingScore: { type: number, format: double }
        recommendationText: { type: string }
        updatedAt: { type: string, format: date-time }

    CategoryProgress:
      type: object
      properties:
        category: { type: string }
        weakPointCount: { type: integer, format: int64 }
        avgForgettingScore: { type: number, format: double }
        lastUpdated: { type: string, format: date-time }

    RecommendationSnapshot:
      type: object
      properties:
        userId: { type: string }
        itemId: { type: string }
        category: { type: string }
        label: { type: string }
        recommendationText: { type: string }
        forgettingScore: { type: number, format: double }
        receivedAt: { type: string, format: date-time }

    LearnerOverview:
      type: object
      description: >
        Composite payload - dashboard-service's progress/recommendations, recording-service's
        recent recordings, and user-service's profile.
      properties:
        userId: { type: string }
        categoryProgress:
          type: array
          items: { $ref: "#/components/schemas/CategoryProgress" }
        recentRecommendations:
          type: array
          items: { $ref: "#/components/schemas/RecommendationSnapshot" }
        recentRecordings:
          type: array
          items: { $ref: "#/components/schemas/Recording" }
        user:
          $ref: "#/components/schemas/User"

    ApiResponseBase:
      type: object
      properties:
        success: { type: boolean }
        errorCode: { type: string, nullable: true }
        message: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

    ApiResponseAuth:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/AuthResponse" }

    ApiResponseUser:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/User" }

    ApiResponseRecording:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Recording" }

    ApiResponseLearnerOverview:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/LearnerOverview" }

    ApiResponseWeakPointsByCategory:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              description: Keyed by "vocabulary" | "grammar" | "pronunciation"
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/WeakPoint" }

    ApiResponseRecommendationsByCategory:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              description: Keyed by "vocabulary" | "grammar" | "pronunciation"
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/Recommendation" }

    ApiResponseError:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { nullable: true }

    DictationFacets:
      type: object
      properties:
        skills: { type: array, items: { type: string } }
        levels: { type: array, items: { type: string } }
        topics: { type: array, items: { type: string } }
        examTypes: { type: array, items: { type: string } }
        minListensForHint: { type: integer, description: "min listens (counted client-side, per sentence) before the FE reveals a hint" }

    DictationFolder:
      type: object
      description: One folder (topic grouping) in the dictation library.
      properties:
        folderId: { type: string }
        name: { type: string }
        lessonCount: { type: integer }

    DictationLessonSummary:
      type: object
      description: >
        One lesson (clip) inside a folder; deliberately light - no scriptText/sentences. sentenceCount
        stands in for a duration estimate. attemptCount/latestAccuracy are the requesting learner's own
        progress on this clip, null when never attempted.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        audioUrl: { type: string }
        level: { type: string, nullable: true }
        sentenceCount: { type: integer }
        attemptCount: { type: integer, nullable: true }
        latestAccuracy: { type: number, format: double, nullable: true, description: "0..1, null when never attempted" }

    DictationSentence:
      type: object
      properties:
        index: { type: integer }
        text: { type: string }
        startMs: { type: integer, nullable: true }
        endMs: { type: integer, nullable: true }
        translation: { type: string, nullable: true, description: "null if no translation was requested/generated" }

    DictationClipDetail:
      type: object
      description: Full clip detail - script + ordered sentences - for sentence-by-sentence practice.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        audioUrl: { type: string }
        scriptText: { type: string }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/DictationSentence" }

    DictationClip:
      type: object
      description: One library clip; omits the script so the answer isn't leaked before grading.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        examType: { type: string }
        audioUrl: { type: string }

    StartDictationSessionRequest:
      type: object
      description: All facets optional; a null facet is unfiltered on that dimension.
      properties:
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        count: { type: integer, minimum: 1, default: 5 }

    DictationAttemptRequest:
      type: object
      required: [userTranscript]
      description: >
        Exactly one of clipId / practiceItemId is set (userId is stamped from the path).
        sentenceMistakes is only sent for sentence-mode library attempts; proxied straight through
        to english-service unchanged.
      properties:
        clipId: { type: integer, format: int64, nullable: true }
        practiceItemId: { type: integer, format: int64, nullable: true }
        userTranscript: { type: string }
        sentenceMistakes:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/DictationSentenceMistake" }

    DictationSentenceMistake:
      type: object
      required: [sentenceIndex, expectedText, attemptedText]
      description: One incorrect check on a single sentence during sentence-mode practice.
      properties:
        sentenceIndex: { type: integer, minimum: 0, description: "0-based position within the clip's sentences" }
        expectedText: { type: string }
        attemptedText: { type: string }

    WordDiff:
      type: object
      properties:
        tag: { type: string, enum: [CORRECT, SUBSTITUTED, MISSING, EXTRA] }
        actualWord: { type: string, nullable: true }
        expectedWord: { type: string, nullable: true }

    DictationErrorEntry:
      type: object
      description: One row of the mistake-comparison table, root-classified.
      properties:
        original: { type: string, nullable: true }
        transcribed: { type: string, nullable: true }
        category: { type: string, enum: [LEXICON, GRAMMAR, PHONOLOGY] }
        note: { type: string, nullable: true, description: "short note on why this was likely misheard/mistyped" }

    DictationRootCauseGroup:
      type: object
      description: A root-cause explanation for one category, only present when it has misses.
      properties:
        category: { type: string, enum: [LEXICON, GRAMMAR, PHONOLOGY] }
        summary: { type: string }
        examples: { type: array, items: { type: string } }

    DictationAttemptResult:
      type: object
      properties:
        referenceText: { type: string }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        diff:
          type: array
          items: { $ref: "#/components/schemas/WordDiff" }
        errorTable:
          type: array
          items: { $ref: "#/components/schemas/DictationErrorEntry" }
        rootCauses:
          type: array
          items: { $ref: "#/components/schemas/DictationRootCauseGroup" }
        actionAdvice: { type: array, items: { type: string }, description: "immediate AI study tips (Vietnamese)" }
        practiceSentences: { type: array, items: { type: string } }

    DictationHistoryEntry:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        clipId: { type: integer, format: int64, nullable: true }
        title: { type: string, nullable: true }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        attemptedAt: { type: string, format: date-time }
        attemptCount:
          type: integer
          nullable: true
          description: How many attempts (including this one) the learner has made on this clip; null for AI-practice entries.
        practiceType:
          type: string
          enum: [LIBRARY, AI_PRACTICE]
          description: LIBRARY when clipId is present, AI_PRACTICE otherwise - lets the UI badge each row.

    DictationMistake:
      type: object
      properties:
        expectedWord: { type: string, nullable: true }
        actualWord: { type: string, nullable: true }
        tag: { type: string, enum: [CORRECT, SUBSTITUTED, MISSING, EXTRA] }

    DictationAttemptDetail:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        title: { type: string, nullable: true }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        referenceText: { type: string }
        userTranscript: { type: string }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        mistakes:
          type: array
          items: { $ref: "#/components/schemas/DictationMistake" }
        errorTable:
          type: array
          items: { $ref: "#/components/schemas/DictationErrorEntry" }
        rootCauses:
          type: array
          items: { $ref: "#/components/schemas/DictationRootCauseGroup" }
        actionAdvice: { type: array, items: { type: string } }
        attemptedAt: { type: string, format: date-time }

    DictationPracticeItem:
      type: object
      properties:
        practiceItemId: { type: integer, format: int64 }
        audioUrl: { type: string, nullable: true }
        level: { type: string, nullable: true, description: "resolved CEFR level; null for items generated without an explicit facet selection" }
        examType: { type: string, nullable: true, description: "resolved exam type; null for items generated without an explicit facet selection" }
        topic: { type: string, nullable: true, description: "short topic label the LLM assigned to the generated passage" }

    DictationPracticeItemDetail:
      type: object
      description: >
        Full AI-practice item detail - passage text split into sentences - proxied from
        english-service, for sentence-by-sentence practice.
      properties:
        practiceItemId: { type: integer, format: int64 }
        audioUrl: { type: string, nullable: true }
        scriptText: { type: string }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/DictationSentence" }

    GenerateAiPracticeRequest:
      type: object
      description: >
        All fields optional. level/examType each accept a concrete value, the literal "RANDOM"
        (resolved server-side by english-service), or omitted/blank (no preference).
        translationLang is the learner's UI language; a translation is only generated when it's
        not "en".
      properties:
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        translationLang: { type: string, nullable: true }

    ApiResponseDictationFacets:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationFacets" }

    ApiResponseDictationClipList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationClip" }

    ApiResponseDictationFolderList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationFolder" }

    ApiResponseDictationLessonSummaryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationLessonSummary" }

    ApiResponseDictationClipDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationClipDetail" }

    ApiResponseDictationAttemptResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationAttemptResult" }

    ApiResponseDictationHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationHistoryEntry" }

    ApiResponseDictationAttemptDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationAttemptDetail" }

    ApiResponseDictationPracticeItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationPracticeItem" }

    ApiResponseDictationPracticeItemDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationPracticeItemDetail" }

    GenerateVocabPracticeRequest:
      type: object
      description: Facets for generating one AI vocabulary practice set; proxied verbatim to english-service.
      properties:
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        focusItems: { type: array, nullable: true, items: { type: string } }

    VocabQuestion:
      type: object
      description: >
        Question shape proxied from english-service. Now carries the correct answer + translation so
        the client can grade each answer locally for instant feedback; the authoritative score still
        comes from the submit endpoint.
      properties:
        index: { type: integer }
        prompt: { type: string }
        type: { type: string, description: "CLOZE | MCQ | MATCHING" }
        options: { type: array, nullable: true, items: { type: string } }
        answer: { type: string, description: "Correct answer, for client-side grading." }
        translation: { type: string, nullable: true }

    VocabPracticeItem:
      type: object
      description: One AI-generated vocabulary practice set, proxied from english-service.
      properties:
        practiceItemId: { type: integer, format: int64 }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        targetWords: { type: array, items: { type: string } }
        questions:
          type: array
          items: { $ref: "#/components/schemas/VocabQuestion" }
        createdAt: { type: string, format: date-time }

    SubmitVocabAttemptRequest:
      type: object
      required: [practiceItemId, answers]
      description: userId is stamped from the path (not required in the request body).
      properties:
        practiceItemId: { type: integer, format: int64 }
        answers:
          type: array
          minItems: 1
          items: { type: string }

    VocabAttemptQuestionResult:
      type: object
      properties:
        index: { type: integer }
        prompt: { type: string }
        yourAnswer: { type: string, nullable: true }
        correctAnswer: { type: string }
        correct: { type: boolean }
        translation: { type: string, nullable: true }

    VocabAttemptResult:
      type: object
      properties:
        accuracy: { type: number, format: double }
        results:
          type: array
          items: { $ref: "#/components/schemas/VocabAttemptQuestionResult" }
        actionAdvice: { type: array, items: { type: string } }

    VocabAttemptHistoryEntry:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        practiceItemId: { type: integer, format: int64 }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        score: { type: number, format: double }
        attemptedAt: { type: string, format: date-time }

    VocabAttemptDetail:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        accuracy: { type: number, format: double }
        results:
          type: array
          items: { $ref: "#/components/schemas/VocabAttemptQuestionResult" }
        attemptedAt: { type: string, format: date-time }

    ApiResponseVocabPracticeItem:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/VocabPracticeItem" }

    ApiResponseVocabPracticeItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/VocabPracticeItem" }

    ApiResponseVocabAttemptResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/VocabAttemptResult" }

    ApiResponseVocabAttemptHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/VocabAttemptHistoryEntry" }

    ApiResponseVocabAttemptDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/VocabAttemptDetail" }

    TopicSummary:
      type: object
      properties:
        topicId: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        level: { type: string, nullable: true }
        wordCount: { type: integer }
        masteredCount: { type: integer }

    ApiResponseTopicSummaryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { type: array, items: { $ref: "#/components/schemas/TopicSummary" } }

    StartSectionRequest:
      type: object
      properties:
        sectionSize: { type: integer, nullable: true, description: "Clamped server-side to [5,20], default 10" }

    SubmitSectionAnswerRequest:
      type: object
      properties:
        submittedAnswer: { type: string, nullable: true, description: "Omit/blank for an INTRO card" }

    SectionProgress:
      type: object
      properties:
        totalWords: { type: integer }
        wordsMastered: { type: integer }
        wordsRemaining: { type: integer }

    SectionCard:
      type: object
      properties:
        sectionId: { type: integer, format: int64 }
        cardKind: { type: string, enum: [INTRO, QUIZ] }
        libraryWordId: { type: integer, format: int64 }
        word: { type: string, nullable: true, description: "Set only on INTRO cards" }
        ipa: { type: string, nullable: true, description: "IPA phonetic transcription, set only on INTRO cards" }
        meaningVi: { type: string, nullable: true }
        exampleEn: { type: string, nullable: true }
        audioUrl: { type: string, nullable: true }
        exerciseType:
          type: string
          nullable: true
          enum: [MCQ, CLOZE, MATCHING, LISTENING_DICTATION, TRANSLATE_EN_TO_VI, TRANSLATE_VI_TO_EN]
        prompt: { type: string, nullable: true }
        options: { type: array, nullable: true, items: { type: string } }
        progress: { $ref: "#/components/schemas/SectionProgress" }

    ApiResponseSectionCard:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SectionCard" }

    SectionAnswerResult:
      type: object
      properties:
        correct: { type: boolean }
        correctAnswer: { type: string, nullable: true }
        score: { type: number, format: double }
        completed: { type: boolean }
        nextCard:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/SectionCard" }]
        progress: { $ref: "#/components/schemas/SectionProgress" }

    ApiResponseSectionAnswerResult:
      allOf:
