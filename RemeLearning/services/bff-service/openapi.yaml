openapi: 3.0.3
info:
  title: BFF Service API
  description: >
    Backend-for-Frontend - single entry point for the web/mobile client. Composes calls to
    user-service (auth/profile), recording-service, english-service (vocabulary/grammar/
    pronunciation), recommendation-service and dashboard-service, and shapes a combined response
    for the UI so the frontend doesn't call each domain service directly.
  version: v1
servers:
  - url: http://localhost:8080

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account; thin proxy to user-service
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuth"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email/password; thin proxy to user-service
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuth"

  /api/v1/users/{userId}:
    get:
      tags: [Users]
      summary: Fetch a user's profile by id; thin proxy to user-service
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
    patch:
      tags: [Users]
      summary: Update a user's profile (name); thin proxy to user-service
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"

  /api/v1/recordings:
    post:
      tags: [Recordings]
      summary: Upload a recording; streamed straight through to recording-service's multipart upload endpoint without buffering the file in bff-service
      operationId: uploadRecording
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, userId]
              properties:
                file:
                  type: string
                  format: binary
                userId:
                  type: string
                languageCode:
                  type: string
                  default: "en"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRecording"

  /api/v1/learners/{userId}/overview:
    get:
      tags: [Learners]
      summary: Composite learner overview - dashboard progress/recommendations + recent recordings, fanned out in parallel to dashboard-service and recording-service
      operationId: getLearnerOverview
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseLearnerOverview"

  /api/v1/learners/{userId}/weak-points:
    get:
      tags: [Learners]
      summary: All of a learner's weak points, merged from english-service's vocabulary/grammar/pronunciation endpoints, keyed by category
      operationId: getLearnerWeakPoints
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseWeakPointsByCategory"

  /api/v1/learners/{userId}/recommendations:
    get:
      tags: [Learners]
      summary: A learner's recommendations grouped by category; thin proxy to recommendation-service
      operationId: getLearnerRecommendations
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseRecommendationsByCategory"

  /api/v1/learners/{userId}/dictation/facets:
    get:
      tags: [Learners]
      summary: The dictation library's filter facets (skill/level/topic/exam-type); thin proxy to english-service
      operationId: getDictationFacets
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationFacets"

  /api/v1/learners/{userId}/dictation/clips:
    get:
      tags: [Learners]
      summary: Browse library clips filtered by skill/level/topic/exam-type; thin proxy to english-service
      operationId: listDictationClips
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: skill, in: query, required: false, schema: { type: string } }
        - { name: level, in: query, required: false, schema: { type: string } }
        - { name: topic, in: query, required: false, schema: { type: string } }
        - { name: examType, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipList"

  /api/v1/learners/{userId}/dictation/folders:
    get:
      tags: [Learners]
      summary: The dictation library's folders (topic groupings), each with its lesson count; thin proxy to english-service
      operationId: getDictationFolders
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationFolderList"

  /api/v1/learners/{userId}/dictation/folders/{folderId}/lessons:
    get:
      tags: [Learners]
      summary: The lessons (clips) inside one dictation folder, light-weight (no script); thin proxy to english-service
      operationId: getDictationFolderLessons
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: folderId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationLessonSummaryList"

  /api/v1/learners/{userId}/dictation/clips/{clipId}:
    get:
      tags: [Learners]
      summary: >
        Full detail for one dictation clip - script + split sentences - for sentence-by-sentence
        practice; thin proxy to english-service
      operationId: getDictationClip
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: clipId, in: path, required: true, schema: { type: integer, format: int64 } }
        - name: translationLang
          in: query
          required: false
          description: Learner's UI language (e.g. "vi"); relayed to english-service, which skips translation when omitted or "en".
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipDetail"
        "404":
          description: No clip with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/learners/{userId}/dictation/clips/{clipId}/audio:
    get:
      tags: [Learners]
      summary: Stream one library clip's audio; relays english-service's audio response
      operationId: getDictationClipAudio
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: clipId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/learners/{userId}/dictation/sessions:
    post:
      tags: [Learners]
      summary: >
        Start a dictation session: a batch of library clips matching the requested facets;
        thin proxy to english-service
      operationId: startDictationSession
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartDictationSessionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipList"

  /api/v1/learners/{userId}/dictation/attempts:
    post:
      tags: [Learners]
      summary: Grade a learner's typed transcript for one dictation exercise; thin proxy to english-service
      operationId: submitDictationAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DictationAttemptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationAttemptResult"

  /api/v1/learners/{userId}/dictation/history:
    get:
      tags: [Learners]
      summary: A learner's past dictation attempts, newest first; thin proxy to english-service
      operationId: getDictationHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationHistoryEntryList"

  /api/v1/learners/{userId}/dictation/history/{attemptId}:
    get:
      tags: [Learners]
      summary: Full detail for one of a learner's own past dictation attempts; thin proxy to english-service
      operationId: getDictationAttemptDetail
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: attemptId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationAttemptDetail"

  /api/v1/learners/{userId}/dictation/history/{attemptId}/ai-practice:
    post:
      tags: [Learners]
      summary: >
        Generate AI-practice audio targeted at one specific past attempt's mistakes (the "Luyện tập
        với AI" history action); thin proxy to english-service
      operationId: generateAiPracticeFromAttempt
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: attemptId, in: path, required: true, schema: { type: integer, format: int64 } }
        - name: translationLang
          in: query
          required: false
          description: Learner's UI language; relayed to english-service to produce a per-line translation alongside the generated passage.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/learners/{userId}/dictation/ai-practice:
    get:
      tags: [Learners]
      summary: A learner's AI-practice items (Gemini + Supertonic); thin proxy to english-service
      operationId: getAiPractice
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/learners/{userId}/dictation/ai-practice/generate:
    post:
      tags: [Learners]
      summary: >
        Generate/synthesize AI-practice audio from a learner's most-missed words, honoring the
        requested level/exam-type facets (concrete value, "RANDOM", or omitted) and translation
        language; thin proxy to english-service
      operationId: generateAiPractice
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        description: All fields optional; omitting the body (or every field) matches the pre-existing default behavior.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAiPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/learners/{userId}/dictation/ai-practice/items/{practiceItemId}/audio:
    get:
      tags: [Learners]
      summary: Stream one AI-practice item's synthesized audio; relays english-service's audio response
      operationId: getAiPracticeAudio
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: practiceItemId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Audio stream (wav)
          content:
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/learners/{userId}/dictation/ai-practice/items/{practiceItemId}/detail:
    get:
      tags: [Learners]
      summary: >
        Full detail for one AI-practice item - passage text split into sentences - for
        sentence-by-sentence practice; thin proxy to english-service
      operationId: getAiPracticeDetail
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: practiceItemId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemDetail"

  /api/v1/learners/{userId}/learn/vocabulary/generate:
    post:
      tags: [Learners]
      summary: >
        Generate one AI vocabulary practice set, targeting the given focus words or (if omitted)
        the learner's own top weak points; thin proxy to english-service
      operationId: generateVocabPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        description: All fields optional; an empty/omitted body falls back to the learner's own top weak points.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateVocabPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabPracticeItem"

  /api/v1/learners/{userId}/learn/vocabulary/items:
    get:
      tags: [Learners]
      summary: A learner's generated vocabulary practice sets, newest first; thin proxy to english-service
      operationId: listVocabPracticeItems
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabPracticeItemList"

  /api/v1/learners/{userId}/learn/vocabulary/items/{itemId}:
    get:
      tags: [Learners]
      summary: Full detail (questions, no answers) for one vocabulary practice set; thin proxy to english-service
      operationId: getVocabPracticeItem
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabPracticeItem"

  /api/v1/learners/{userId}/learn/vocabulary/attempts:
    post:
      tags: [Learners]
      summary: Grade a submitted vocabulary-practice attempt; thin proxy to english-service
      operationId: submitVocabAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        description: userId is stamped from the path onto the request before it's proxied to english-service.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVocabAttemptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabAttemptResult"

  /api/v1/learners/{userId}/learn/vocabulary/history:
    get:
      tags: [Learners]
      summary: A learner's past vocabulary-practice attempts, newest first; thin proxy to english-service
      operationId: getVocabPracticeHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabAttemptHistoryEntryList"

  /api/v1/learners/{userId}/learn/vocabulary/history/{attemptId}:
    get:
      tags: [Learners]
      summary: Full detail for one of a learner's own past vocabulary-practice attempts; thin proxy to english-service
      operationId: getVocabAttemptDetail
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabAttemptDetail"

  /api/v1/learners/{userId}/learn/vocabulary/library/topics:
    get:
      tags: [Learners]
      summary: List every vocabulary-library topic with word count and mastered-word count; thin proxy to english-service
      operationId: listVocabLibraryTopics
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSummaryList"

  /api/v1/learners/{userId}/learn/vocabulary/library/topics/{topicId}/sections:
    post:
      tags: [Learners]
      summary: Start a new vocabulary-library Section for a topic; thin proxy to english-service
      operationId: startVocabSection
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: topicId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSectionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionCard"

  /api/v1/learners/{userId}/learn/vocabulary/library/sections/{sectionId}/answers:
    post:
      tags: [Learners]
      summary: Grade the current Section card's answer and get the next card; thin proxy to english-service
      operationId: submitVocabSectionAnswer
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSectionAnswerRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionAnswerResult"

  /api/v1/learners/{userId}/learn/vocabulary/library/sections/{sectionId}/finish:
    post:
      tags: [Learners]
      summary: End a vocabulary-library Section early; thin proxy to english-service
      operationId: finishVocabSection
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionAnswerResult"

  /api/v1/learners/{userId}/learn/vocabulary/library/sections/history:
    get:
      tags: [Learners]
      summary: A learner's finished vocabulary-library Sections, newest first; thin proxy to english-service
      operationId: getVocabSectionHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionHistoryEntryList"

  /api/v1/learners/{userId}/learn/vocabulary/library/words/{wordId}/audio:
    get:
      tags: [Learners]
      summary: Stream one vocabulary-library word's synthesized audio; relays english-service's audio response
      operationId: getVocabLibraryWordAudio
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: wordId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/learners/{userId}/learn/grammar/generate:
    post:
      tags: [Learners]
      summary: >
        Generate one AI grammar practice set, targeting the given focus rules or (if omitted) the
        learner's own top weak points; thin proxy to english-service
      operationId: generateGrammarPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        description: All fields optional; an empty/omitted body falls back to the learner's own top weak points.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGrammarPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarPracticeItem"

  /api/v1/learners/{userId}/learn/grammar/items:
    get:
      tags: [Learners]
      summary: A learner's generated grammar practice sets, newest first; thin proxy to english-service
      operationId: listGrammarPracticeItems
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarPracticeItemList"

  /api/v1/learners/{userId}/learn/grammar/items/{itemId}:
    get:
      tags: [Learners]
      summary: Full detail (questions, no answers) for one grammar practice set; thin proxy to english-service
      operationId: getGrammarPracticeItem
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarPracticeItem"

  /api/v1/learners/{userId}/learn/grammar/attempts:
    post:
      tags: [Learners]
      summary: Grade a submitted grammar-practice attempt; thin proxy to english-service
      operationId: submitGrammarAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        description: userId is stamped from the path onto the request before it's proxied to english-service.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitGrammarAttemptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarAttemptResult"

  /api/v1/learners/{userId}/learn/grammar/history:
    get:
      tags: [Learners]
      summary: A learner's past grammar-practice attempts, newest first; thin proxy to english-service
      operationId: getGrammarPracticeHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarAttemptHistoryEntryList"

