spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: english-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?currentSchema=reme_english}
    username: ${DB_USERNAME:postgres.oaltfczuectbznkuywfm}
    password: ${DB_PASSWORD:Remelearning123!}
    schema: ${DB_SCHEMA:reme_english}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: english-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: ${DB_SCHEMA:reme_english}
    create-schemas: true

server:
  port: 8085

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

reme:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-minutes: 60
  storage:
    # local (default) reads the dictation audio library from disk and stores generated TTS there;
    # switch to s3 later without code changes (see common's storage/README.md).
    provider: ${STORAGE_PROVIDER:local}
    local:
      root: ${STORAGE_LOCAL_ROOT:D:/Personal Project/Audio}
    s3:
      bucket: ${STORAGE_S3_BUCKET:reme-dictation-audio}
  s3:
    region: ${S3_REGION:ap-southeast-1}
    endpoint: ${S3_ENDPOINT:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
  llm:
    provider: ${LLM_PROVIDER:zen} #  gemini | ollama | zen
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
    ollama:
      model: ${OLLAMA_MODEL:deepseek-v4-flash:cloud}
      api-key: ${OLLAMA_API_KEY:}
    zen:
      api-key: ${ZEN_API_KEY:}
      model: ${ZEN_MODEL:big-pickle}
  tts:
    # supertonic (default) calls ai-service's on-device Supertonic model; google is the alternative.
    provider: ${TTS_PROVIDER:supertonic}
    supertonic:
      base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    google:
      api-key: ${GOOGLE_TTS_API_KEY:}
  alignment:
    # ai-service's Whisper word-timestamp alignment (POST /api/v1/dictation/align-sentences), used by
    # dictation's getClipDetail to lazily fill in sentences[].startMs/endMs.
    ai-service:
      base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
      read-timeout-seconds: ${ALIGNMENT_READ_TIMEOUT_SECONDS:120}

vocabulary:
  classifier:
    mode: ${VOCABULARY_CLASSIFIER_MODE:rule-based} # rule-based | llm

grammar:
  classifier:
    mode: ${GRAMMAR_CLASSIFIER_MODE:rule-based} # rule-based | llm

pronunciation:
  classifier:
    mode: ${PRONUNCIATION_CLASSIFIER_MODE:rule-based} # rule-based | llm

dictation:
  # rule-based (default, no LLM cost) or llm (Gemini) for the miss analysis + practice sentences.
  analyzer:
    mode: ${DICTATION_ANALYZER_MODE:llm} # rule-based | llm
  # The fixed audio library (rooted at reme.storage.local.root) is imported into dictation_clips on
  # startup via common's StorageClient. Turn off to skip the scan (e.g. once already imported).
  library:
    import-on-startup: ${DICTATION_IMPORT_ON_STARTUP:true}
  # Supertonic voice/lang used when synthesizing AI-practice audio.
  tts:
    voice: ${DICTATION_TTS_VOICE:F1}
    lang: ${DICTATION_TTS_LANG:en}
  ai-practice:
    # How many of the learner's most-missed words feed a fresh AI-practice batch.
    miss-window: ${DICTATION_MISS_WINDOW:8}
