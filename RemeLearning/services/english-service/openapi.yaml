openapi: 3.0.3
info:
  title: English Service API
  description: English-skill analysis (vocabulary, grammar, pronunciation) - modular monolith
  version: v1
servers:
  - url: http://localhost:8085

paths:
  /api/v1/transcripts/{recordingId}:
    get:
      tags: [Transcripts]
      summary: Get the stored transcript for a recording, including timestamped/speaker-tagged segments
      operationId: getTranscriptByRecordingId
      parameters:
        - name: recordingId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseTranscriptResponse"
        "404":
          description: No transcript stored for this recordingId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/vocabulary/weak-points/{userId}:
    get:
      tags: [Vocabulary Weak Points]
      summary: List a learner's forgotten vocabulary items, optionally filtered by type, sorted by forgetting score desc
      operationId: getVocabularyWeakPointsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/VocabularyType" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabularyWeakPointList"

  /api/v1/vocabulary/weak-points/{userId}/grouped:
    get:
      tags: [Vocabulary Weak Points]
      summary: Same as GET /{userId}, grouped by vocabulary type
      operationId: getVocabularyWeakPointsByUserGrouped
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabularyWeakPointGrouped"

  /api/v1/grammar/weak-points/{userId}:
    get:
      tags: [Grammar Weak Points]
      summary: List a learner's recurring grammar mistakes, optionally filtered by rule type, sorted by forgetting score desc
      operationId: getGrammarWeakPointsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/GrammarType" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarWeakPointList"

  /api/v1/grammar/weak-points/{userId}/grouped:
    get:
      tags: [Grammar Weak Points]
      summary: Same as GET /{userId}, grouped by grammar rule type
      operationId: getGrammarWeakPointsByUserGrouped
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarWeakPointGrouped"

  /api/v1/pronunciation/weak-points/{userId}:
    get:
      tags: [Pronunciation Weak Points]
      summary: List a learner's recurring pronunciation issues, optionally filtered by type, sorted by forgetting score desc
      operationId: getPronunciationWeakPointsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/PronunciationType" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePronunciationWeakPointList"

  /api/v1/pronunciation/weak-points/{userId}/grouped:
    get:
      tags: [Pronunciation Weak Points]
      summary: Same as GET /{userId}, grouped by pronunciation type
      operationId: getPronunciationWeakPointsByUserGrouped
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePronunciationWeakPointGrouped"

  /api/v1/practice/redo:
    post:
      tags: [Practice]
      summary: >
        Submit the graded results of a learner redoing an exercise (vocabulary/grammar/pronunciation
        items mixed together); grades and logs each attempt, scores each one directly against the
        Java scoring engine (updating the owning domain's weak-point row immediately - no dependency
        on ai-service/Kafka for this), and also asks ai-service to recompute forgetting scores so
        recommendation-service/dashboard-service (which only consume learning.gap.analyzed) stay
        in sync; a score_source guard on each domain's upsert keeps that slower, Python-sourced
        recompute from overwriting a fresher Java-computed score for the same item
      operationId: redoPractice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeRedoRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

  /api/v1/practice/review-queue/{userId}:
    get:
      tags: [Practice]
      summary: >
        Items due for review now or earlier, per the Leitner spaced-repetition schedule the Java
        scoring engine maintains in mistake_history, soonest-first
      operationId: getReviewQueue
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseReviewQueueItemList"

  /api/v1/dictation/facets:
    get:
      tags: [Dictation]
      summary: The distinct skill/level/topic/exam-type values across the library, for the UI filters
      operationId: getDictationFacets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationFacets"

  /api/v1/dictation/clips:
    get:
      tags: [Dictation]
      summary: Browse library clips, filtered by any subset of skill/level/topic/examType
      operationId: listDictationClips
      parameters:
        - { name: skill, in: query, required: false, schema: { type: string } }
        - { name: level, in: query, required: false, schema: { type: string } }
        - { name: topic, in: query, required: false, schema: { type: string } }
        - { name: examType, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipList"

  /api/v1/dictation/folders:
    get:
      tags: [Dictation]
      summary: The distinct clip folders (topic groupings), each with its lesson count, for folder->file browsing
      operationId: listDictationFolders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationFolderList"

  /api/v1/dictation/folders/{folderId}/lessons/{userId}:
    get:
      tags: [Dictation]
      summary: >
        The lessons (clips) inside one folder - light-weight, no scriptText/sentences, so the answer
        only loads once the learner opens a specific lesson via GET /dictation/clips/{clipId} - each
        joined with userId's own progress on it (sentenceCount, attemptCount, latestAccuracy; the
        latter two null when never attempted)
      operationId: listDictationFolderLessons
      parameters:
        - name: folderId
          in: path
          required: true
          schema: { type: string }
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationLessonSummaryList"

  /api/v1/dictation/clips/{clipId}:
    get:
      tags: [Dictation]
      summary: >
        Full detail for one clip - scriptText + ordered sentences. Any sentence still missing
        startMs/endMs is lazily AI-aligned (calls ai-service's Whisper-based alignment) before this
        responds; a sentence that can't be aligned stays null and is retried on a later call
      operationId: getDictationClipDetail
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: translationLang
          in: query
          required: false
          description: >
            Learner's UI language (e.g. "vi"); when present and not "en", each sentence still
            missing a translation is lazily translated via the LLM and persisted. Omitted or "en"
            skips translation entirely.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipDetail"
        "404":
          description: No clip with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/clips/{clipId}/audio:
    get:
      tags: [Dictation]
      summary: Stream one library clip's audio (read from storage; mp3/wav)
      operationId: getDictationClipAudio
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/dictation/sessions/{userId}:
    post:
      tags: [Dictation]
      summary: >
        Start a session: a random batch of library clips matching the requested facets
        (skill/level/topic/examType). The response omits the script so the answer isn't leaked.
      operationId: startDictationSession
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartDictationSessionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipList"

  /api/v1/dictation/attempts:
    post:
      tags: [Dictation]
      summary: >
        Grade a learner's typed transcript (for a library clip or an AI-practice clip) with a
        word-level WER/diff scorer, record the misses, return the reference text + diff + a
        root-cause-classified mistake analysis (errorTable/rootCauses/actionAdvice, Lexicon vs.
        Grammar vs. Phonology) + practice sentences, and publish the misses onto
        learning.gap.analyzed so the recommendation pipeline turns them into study suggestions.
      operationId: submitDictationAttempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DictationAttemptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationAttemptResult"
        "400":
          description: Neither clipId nor practiceItemId was provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
        "404":
          description: No clip/practice item with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/history/{userId}:
    get:
      tags: [Dictation]
      summary: A learner's past dictation attempts, newest first
      operationId: getDictationHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationHistoryEntryList"

  /api/v1/dictation/history/{userId}/{attemptId}:
    get:
      tags: [Dictation]
      summary: >
        Full detail for one of a learner's own past attempts - reference text, transcript, mistakes,
        and the AI suggestions generated at the time
      operationId: getDictationAttemptDetail
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationAttemptDetail"
        "404":
          description: No attempt with the given id, or it doesn't belong to userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/history/{userId}/{attemptId}/ai-practice:
    post:
      tags: [Dictation]
      summary: >
        Generate AI-practice clips targeted at one specific past attempt's mistakes (the "Luyện tập
        với AI" action from a history row): Gemini sentences from that attempt's misses, voiced by
        Supertonic (via ai-service) and stored via the StorageClient
      operationId: generateAiPracticeFromAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: translationLang
          in: query
          required: false
          description: >
            Learner's UI language (e.g. "vi"); when present and not "en", the generated passage's
            per-line translation is produced alongside the passage text. No level/examType selector
            exists for this entry point - both resolve to the generator's own default.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"
        "404":
          description: No attempt with the given id, or it doesn't belong to userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/ai-practice/{userId}:
    get:
      tags: [Dictation]
      summary: A learner's AI-practice items (audio URL present once synthesized by Supertonic)
      operationId: getAiPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/dictation/ai-practice/{userId}/generate:
    post:
      tags: [Dictation]
      summary: >
        Generates one AI-practice listening passage (a monologue or multi-speaker dialogue,
        written by Gemini) targeting the learner's still-unsynthesized practice items or, if none,
        their most-missed words; assigns a random Supertonic voice per speaker, synthesizes each
        line via ai-service, merges the clips into one audio file, stores it via StorageClient, and
        replaces any prior unsynthesized items with this single new one
      operationId: generateAiPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        description: >
          All fields optional; omitting the body entirely (or every field) matches the pre-existing
          default behavior (no facet preference, no translation).
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAiPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/dictation/ai-practice/items/{practiceItemId}/audio:
    get:
      tags: [Dictation]
      summary: Stream one AI-practice item's synthesized audio
      operationId: getAiPracticeAudio
      parameters:
        - name: practiceItemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Audio stream (wav)
          content:
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/dictation/ai-practice/items/{practiceItemId}/detail:
    get:
      tags: [Dictation]
      summary: >
        Full detail for one AI-practice item - passage text split into sentences, mirroring
        getDictationClipDetail - so the same sentence-by-sentence runner drives both the library and
        the "Luyện nghe với AI" section. Sentences never carry AI-aligned timestamps (the passage's
        audio is one merged file with no per-sentence timing); the client falls back to its own
        word-count-share estimate the same way it does for an unaligned library clip.
      operationId: getAiPracticeDetail
      parameters:
        - name: practiceItemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemDetail"
        "404":
          description: No AI-practice item with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/learn/vocabulary/{userId}/generate:
    post:
      tags: [Vocabulary Learn]
      summary: >
        Generate one AI vocabulary practice set (cloze/MCQ/matching-by-meaning), targeting the
        given focus words or (if omitted) the learner's own top weak points
      operationId: generateVocabPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        description: All fields optional; an empty/omitted body falls back to the learner's own top weak points.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateVocabPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabPracticeItem"

  /api/v1/learn/vocabulary/items/{itemId}:
    get:
      tags: [Vocabulary Learn]
      summary: Full detail (questions, no answers) for one practice set
      operationId: getVocabPracticeItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabPracticeItem"

  /api/v1/learn/vocabulary/{userId}/items:
    get:
      tags: [Vocabulary Learn]
      summary: A learner's generated practice sets, newest first
      operationId: listVocabPracticeItems
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabPracticeItemList"

  /api/v1/learn/vocabulary/attempts:
    post:
      tags: [Vocabulary Learn]
      summary: >
        Grade a submitted attempt (answers aligned by index to the practice item's questions);
        feeds each graded word into the existing weak-point/spaced-repetition pipeline
      operationId: submitVocabAttempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVocabAttemptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabAttemptResult"

  /api/v1/learn/vocabulary/history/{userId}:
    get:
      tags: [Vocabulary Learn]
      summary: A learner's past vocabulary-practice attempts, newest first
      operationId: getVocabAttemptHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabAttemptHistoryEntryList"

  /api/v1/learn/vocabulary/history/{userId}/{attemptId}:
    get:
      tags: [Vocabulary Learn]
      summary: Full detail for one of a learner's own past attempts
      operationId: getVocabAttemptDetail
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabAttemptDetail"

  /api/v1/learn/vocabulary/library/{userId}/topics:
    get:
      tags: [Vocabulary Library]
      summary: List every topic with its word count and this learner's mastered-word count
      operationId: listVocabLibraryTopics
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseTopicSummaryList"

  /api/v1/learn/vocabulary/library/{userId}/topics/{topicId}/sections:
    post:
      tags: [Vocabulary Library]
      summary: >
        Start a new Section for a topic (topping up its word bank via the LLM first if needed);
        returns the first card
      operationId: startVocabSection
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: topicId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSectionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionCard"

  /api/v1/learn/vocabulary/library/sections/{sectionId}/answers:
    post:
      tags: [Vocabulary Library]
      summary: >
        Grade the current card's answer (or acknowledge an INTRO) and get the next card, or a
        completed result
      operationId: submitVocabSectionAnswer
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSectionAnswerRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionAnswerResult"

  /api/v1/learn/vocabulary/library/sections/{sectionId}/finish:
    post:
      tags: [Vocabulary Library]
      summary: End an in-progress Section early; whatever was answered still feeds the weak-point pipeline
      operationId: finishVocabSection
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionAnswerResult"

  /api/v1/learn/vocabulary/library/{userId}/sections/history:
    get:
      tags: [Vocabulary Library]
      summary: A learner's finished Sections, newest first
      operationId: getVocabSectionHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSectionHistoryEntryList"

  /api/v1/learn/vocabulary/library/words/{wordId}/audio:
    get:
      tags: [Vocabulary Library]
      summary: Stream one library word's synthesized pronunciation audio
      operationId: getVocabLibraryWordAudio
      parameters:
        - name: wordId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            audio/wav:
              schema: { type: string, format: binary }

  /api/v1/learn/grammar/{userId}/generate:
    post:
      tags: [Grammar Learn]
      summary: >
        Generate one AI grammar practice set (error-correction/fill-tense/transform/MCQ), targeting
        the given focus rules or (if omitted) the learner's own top weak points
      operationId: generateGrammarPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        description: All fields optional; an empty/omitted body falls back to the learner's own top weak points.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGrammarPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarPracticeItem"

  /api/v1/learn/grammar/items/{itemId}:
    get:
      tags: [Grammar Learn]
      summary: Full detail (questions, no answers) for one practice set
      operationId: getGrammarPracticeItem
      parameters:
        - name: itemId
          in: path
          required: true
