          properties:
            data: { $ref: "#/components/schemas/ListeningAttemptResult" }

    ApiResponseListeningAttemptHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/ListeningAttemptHistoryEntry" }

    ApiResponseListeningAttemptDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/ListeningAttemptDetail" }

    GenerateSpeakingPracticeRequest:
      type: object
      description: >
        All fields optional; when focusItems is empty/omitted the service falls back to the
        learner's own top pronunciation weak points, then to a generic level-appropriate sentence
        if the learner has none yet.
      properties:
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        focusItems: { type: array, nullable: true, items: { type: string } }

    SpeakingPracticeItem:
      type: object
      description: >
        Unlike vocabulary/grammar/listening, the target text is shown upfront - speaking practice
        is about pronouncing known text, not testing comprehension.
      properties:
        practiceItemId: { type: integer, format: int64 }
        sampleAudioUrl: { type: string, nullable: true, description: "null until Supertonic has synthesized the sample (model) audio" }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        targetText: { type: string }
        translation: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    PhonemeScore:
      type: object
      description: One scored phoneme (IPA symbol), proxied from ai-service's GOP result.
      properties:
        ipa: { type: string }
        score: { type: number, format: double }

    WordScore:
      type: object
      description: One scored word, proxied from ai-service's GOP result.
      properties:
        word: { type: string }
        score: { type: number, format: double }
        phonemes:
          type: array
          items: { $ref: "#/components/schemas/PhonemeScore" }

    SpeakingAttemptResult:
      type: object
      properties:
        overall: { type: number, format: double }
        words:
          type: array
          items: { $ref: "#/components/schemas/WordScore" }
        transcript: { type: string, description: "what the learner actually said, per ai-service's own ASR pass" }
        weakPhonemes: { type: array, items: { type: string } }
        actionAdvice: { type: array, items: { type: string } }

    SpeakingAttemptHistoryEntry:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        practiceItemId: { type: integer, format: int64 }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        overallScore: { type: number, format: double }
        attemptedAt: { type: string, format: date-time }

    SpeakingAttemptDetail:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        targetText: { type: string }
        overallScore: { type: number, format: double }
        words:
          type: array
          items: { $ref: "#/components/schemas/WordScore" }
        transcript: { type: string }
        weakPhonemes: { type: array, items: { type: string } }
        attemptedAt: { type: string, format: date-time }

    ApiResponseSpeakingPracticeItem:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SpeakingPracticeItem" }

    ApiResponseSpeakingPracticeItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/SpeakingPracticeItem" }

    ApiResponseSpeakingAttemptResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SpeakingAttemptResult" }

    ApiResponseSpeakingAttemptHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/SpeakingAttemptHistoryEntry" }

    ApiResponseSpeakingAttemptDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SpeakingAttemptDetail" }

    SpeakingLibraryTopic:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        level: { type: string }
        status: { type: string, enum: [LOCKED, UNLOCKED, IN_PROGRESS, PASSED] }

    ApiResponseSpeakingLibraryTopicList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { type: array, items: { $ref: "#/components/schemas/SpeakingLibraryTopic" } }

    SpeakingLibrarySectionSentence:
      type: object
      description: Learner-facing view of a sample sentence - text, IPA and a fetchable sample-audio URL (null until Supertonic has synthesized it).
      properties:
        sentenceId: { type: integer, format: int64 }
        sentenceText: { type: string }
        ipa: { type: string, nullable: true }
        sampleAudioUrl: { type: string, nullable: true }

    SpeakingLibrarySection:
      type: object
      description: A section ready to practice - its pool of sample sentences.
      properties:
        sectionId: { type: integer, format: int64 }
        sentences: { type: array, items: { $ref: "#/components/schemas/SpeakingLibrarySectionSentence" } }

    ApiResponseSpeakingLibrarySection:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SpeakingLibrarySection" }

    SentenceAttemptResult:
      type: object
      description: Scoring result for one recorded sentence attempt - does not itself affect topic gating (see the finish endpoint).
      properties:
        sentenceId: { type: integer, format: int64 }
        phonemeScore: { type: number, format: double }
        wordScore: { type: number, format: double }
        passed: { type: boolean }
        transcript: { type: string }

    ApiResponseSentenceAttemptResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SentenceAttemptResult" }

    FinishSpeakingSection:
      type: object
      properties:
        totalSentences: { type: integer }
        passedSentences: { type: integer }
        passed: { type: boolean }
        nextTopicId: { type: integer, format: int64, nullable: true }
        nextTopicUnlocked: { type: boolean }

    ApiResponseFinishSpeakingSection:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/FinishSpeakingSection" }

    SpeakingLibraryAttempt:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: string }
        sectionId: { type: integer, format: int64 }
        sentenceId: { type: integer, format: int64 }
        phonemeScore: { type: number, format: double }
        wordScore: { type: number, format: double }
        recordedAudioStorageKey: { type: string, nullable: true }
        weakPhonemesJson: { type: string, nullable: true, description: "JSON array of IPA symbols scored below the GOP weak-phoneme threshold for this attempt" }
        createdAt: { type: string, format: date-time }

    ApiResponseSpeakingLibraryAttemptList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { type: array, items: { $ref: "#/components/schemas/SpeakingLibraryAttempt" } }

    SpeakingHistoryEntry:
      type: object
      description: >
        One row in the merged speaking history list - either a "học thường" (learn) attempt or a
        "Thư viện" (library) sentence attempt, normalized to one shape and tagged by source. Library
        rows stay at SpeakingLibraryAttempt's existing granularity (one per scored sentence attempt).
      properties:
        source: { type: string, enum: [LEARN, LIBRARY] }
        attemptOrSessionId: { type: integer, format: int64 }
        completedAt: { type: string, format: date-time, nullable: true }
        score: { type: number, format: double, nullable: true }
        sectionId: { type: integer, format: int64, nullable: true, description: "Only populated for LIBRARY rows - kept for reference/debugging." }
        topicId: { type: integer, format: int64, nullable: true, description: "Only populated for LIBRARY rows (resolved server-side from sectionId) - the FE's \"Làm lại\" deep-link navigation target." }

    ApiResponseSpeakingHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { type: array, items: { $ref: "#/components/schemas/SpeakingHistoryEntry" } }
