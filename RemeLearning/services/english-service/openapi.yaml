openapi: 3.0.3
info:
  title: English Service API
  description: English-skill analysis (vocabulary, grammar, pronunciation) - modular monolith
  version: v1
servers:
  - url: http://localhost:8085

paths:
  /api/v1/transcripts/{recordingId}:
    get:
      tags: [Transcripts]
      summary: Get the stored transcript for a recording, including timestamped/speaker-tagged segments
      operationId: getTranscriptByRecordingId
      parameters:
        - name: recordingId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseTranscriptResponse"
        "404":
          description: No transcript stored for this recordingId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/vocabulary/weak-points/{userId}:
    get:
      tags: [Vocabulary Weak Points]
      summary: List a learner's forgotten vocabulary items, optionally filtered by type, sorted by forgetting score desc
      operationId: getVocabularyWeakPointsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/VocabularyType" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabularyWeakPointList"

  /api/v1/vocabulary/weak-points/{userId}/grouped:
    get:
      tags: [Vocabulary Weak Points]
      summary: Same as GET /{userId}, grouped by vocabulary type
      operationId: getVocabularyWeakPointsByUserGrouped
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVocabularyWeakPointGrouped"

  /api/v1/grammar/weak-points/{userId}:
    get:
      tags: [Grammar Weak Points]
      summary: List a learner's recurring grammar mistakes, optionally filtered by rule type, sorted by forgetting score desc
      operationId: getGrammarWeakPointsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/GrammarType" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarWeakPointList"

  /api/v1/grammar/weak-points/{userId}/grouped:
    get:
      tags: [Grammar Weak Points]
      summary: Same as GET /{userId}, grouped by grammar rule type
      operationId: getGrammarWeakPointsByUserGrouped
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseGrammarWeakPointGrouped"

  /api/v1/pronunciation/weak-points/{userId}:
    get:
      tags: [Pronunciation Weak Points]
      summary: List a learner's recurring pronunciation issues, optionally filtered by type, sorted by forgetting score desc
      operationId: getPronunciationWeakPointsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { $ref: "#/components/schemas/PronunciationType" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePronunciationWeakPointList"

  /api/v1/pronunciation/weak-points/{userId}/grouped:
    get:
      tags: [Pronunciation Weak Points]
      summary: Same as GET /{userId}, grouped by pronunciation type
      operationId: getPronunciationWeakPointsByUserGrouped
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePronunciationWeakPointGrouped"

  /api/v1/practice/redo:
    post:
      tags: [Practice]
      summary: >
        Submit the graded results of a learner redoing an exercise (vocabulary/grammar/pronunciation
        items mixed together); grades and logs each attempt, scores each one directly against the
        Java scoring engine (updating the owning domain's weak-point row immediately - no dependency
        on ai-service/Kafka for this), and also asks ai-service to recompute forgetting scores so
        recommendation-service/dashboard-service (which only consume learning.gap.analyzed) stay
        in sync; a score_source guard on each domain's upsert keeps that slower, Python-sourced
        recompute from overwriting a fresher Java-computed score for the same item
      operationId: redoPractice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeRedoRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

  /api/v1/practice/review-queue/{userId}:
    get:
      tags: [Practice]
      summary: >
        Items due for review now or earlier, per the Leitner spaced-repetition schedule the Java
        scoring engine maintains in mistake_history, soonest-first
      operationId: getReviewQueue
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseReviewQueueItemList"

  /api/v1/dictation/facets:
    get:
      tags: [Dictation]
      summary: The distinct skill/level/topic/exam-type values across the library, for the UI filters
      operationId: getDictationFacets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationFacets"

  /api/v1/dictation/clips:
    get:
      tags: [Dictation]
      summary: Browse library clips, filtered by any subset of skill/level/topic/examType
      operationId: listDictationClips
      parameters:
        - { name: skill, in: query, required: false, schema: { type: string } }
        - { name: level, in: query, required: false, schema: { type: string } }
        - { name: topic, in: query, required: false, schema: { type: string } }
        - { name: examType, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipList"

  /api/v1/dictation/folders:
    get:
      tags: [Dictation]
      summary: The distinct clip folders (topic groupings), each with its lesson count, for folder->file browsing
      operationId: listDictationFolders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationFolderList"

  /api/v1/dictation/folders/{folderId}/lessons:
    get:
      tags: [Dictation]
      summary: >
        The lessons (clips) inside one folder - light-weight, no scriptText/sentences, so the answer
        only loads once the learner opens a specific lesson via GET /dictation/clips/{clipId}
      operationId: listDictationFolderLessons
      parameters:
        - name: folderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationLessonSummaryList"

  /api/v1/dictation/clips/{clipId}:
    get:
      tags: [Dictation]
      summary: >
        Full detail for one clip - scriptText + ordered sentences. Any sentence still missing
        startMs/endMs is lazily AI-aligned (calls ai-service's Whisper-based alignment) before this
        responds; a sentence that can't be aligned stays null and is retried on a later call
      operationId: getDictationClipDetail
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: translationLang
          in: query
          required: false
          description: >
            Learner's UI language (e.g. "vi"); when present and not "en", each sentence still
            missing a translation is lazily translated via the LLM and persisted. Omitted or "en"
            skips translation entirely.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipDetail"
        "404":
          description: No clip with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/clips/{clipId}/audio:
    get:
      tags: [Dictation]
      summary: Stream one library clip's audio (read from storage; mp3/wav)
      operationId: getDictationClipAudio
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/dictation/sessions/{userId}:
    post:
      tags: [Dictation]
      summary: >
        Start a session: a random batch of library clips matching the requested facets
        (skill/level/topic/examType). The response omits the script so the answer isn't leaked.
      operationId: startDictationSession
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartDictationSessionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationClipList"

  /api/v1/dictation/attempts:
    post:
      tags: [Dictation]
      summary: >
        Grade a learner's typed transcript (for a library clip or an AI-practice clip) with a
        word-level WER/diff scorer, record the misses, return the reference text + diff + immediate
        AI suggestions + practice sentences, and publish the misses onto learning.gap.analyzed so the
        recommendation pipeline turns them into study suggestions.
      operationId: submitDictationAttempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DictationAttemptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationAttemptResult"
        "400":
          description: Neither clipId nor practiceItemId was provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"
        "404":
          description: No clip/practice item with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/history/{userId}:
    get:
      tags: [Dictation]
      summary: A learner's past dictation attempts, newest first
      operationId: getDictationHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationHistoryEntryList"

  /api/v1/dictation/history/{userId}/{attemptId}:
    get:
      tags: [Dictation]
      summary: >
        Full detail for one of a learner's own past attempts - reference text, transcript, mistakes,
        and the AI suggestions generated at the time
      operationId: getDictationAttemptDetail
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationAttemptDetail"
        "404":
          description: No attempt with the given id, or it doesn't belong to userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/history/{userId}/{attemptId}/ai-practice:
    post:
      tags: [Dictation]
      summary: >
        Generate AI-practice clips targeted at one specific past attempt's mistakes (the "Luyện tập
        với AI" action from a history row): Gemini sentences from that attempt's misses, voiced by
        Supertonic (via ai-service) and stored via the StorageClient
      operationId: generateAiPracticeFromAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: attemptId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: translationLang
          in: query
          required: false
          description: >
            Learner's UI language (e.g. "vi"); when present and not "en", the generated passage's
            per-line translation is produced alongside the passage text. No level/examType selector
            exists for this entry point - both resolve to the generator's own default.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"
        "404":
          description: No attempt with the given id, or it doesn't belong to userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/dictation/ai-practice/{userId}:
    get:
      tags: [Dictation]
      summary: A learner's AI-practice items (audio URL present once synthesized by Supertonic)
      operationId: getAiPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/dictation/ai-practice/{userId}/generate:
    post:
      tags: [Dictation]
      summary: >
        Generates one AI-practice listening passage (a monologue or multi-speaker dialogue,
        written by Gemini) targeting the learner's still-unsynthesized practice items or, if none,
        their most-missed words; assigns a random Supertonic voice per speaker, synthesizes each
        line via ai-service, merges the clips into one audio file, stores it via StorageClient, and
        replaces any prior unsynthesized items with this single new one
      operationId: generateAiPractice
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        description: >
          All fields optional; omitting the body entirely (or every field) matches the pre-existing
          default behavior (no facet preference, no translation).
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAiPracticeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemList"

  /api/v1/dictation/ai-practice/items/{practiceItemId}/audio:
    get:
      tags: [Dictation]
      summary: Stream one AI-practice item's synthesized audio
      operationId: getAiPracticeAudio
      parameters:
        - name: practiceItemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Audio stream (wav)
          content:
            audio/wav: { schema: { type: string, format: binary } }

  /api/v1/dictation/ai-practice/items/{practiceItemId}/detail:
    get:
      tags: [Dictation]
      summary: >
        Full detail for one AI-practice item - passage text split into sentences, mirroring
        getDictationClipDetail - so the same sentence-by-sentence runner drives both the library and
        the "Luyện nghe với AI" section. Sentences never carry AI-aligned timestamps (the passage's
        audio is one merged file with no per-sentence timing); the client falls back to its own
        word-count-share estimate the same way it does for an unaligned library clip.
      operationId: getAiPracticeDetail
      parameters:
        - name: practiceItemId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDictationPracticeItemDetail"
        "404":
          description: No AI-practice item with the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

components:
  schemas:
    VocabularyType:
      type: string
      enum: [NOUN, VERB, ADJECTIVE, ADVERB, PHRASAL_VERB, COLLOCATION, IDIOM, OTHER]

    GrammarType:
      type: string
      enum: [TENSE, SUBJECT_VERB_AGREEMENT, ARTICLE, PREPOSITION, WORD_ORDER, PLURAL, PUNCTUATION, OTHER]

    PronunciationType:
      type: string
      enum: [VOWEL, CONSONANT, STRESS, INTONATION, LINKING, RHYTHM, OTHER]

    TranscriptSegment:
      type: object
      properties:
        id: { type: integer, format: int64 }
        transcriptId: { type: integer, format: int64 }
        speaker: { type: string }
        content: { type: string }
        startSeconds: { type: number, format: double }
        endSeconds: { type: number, format: double }
        segmentOrder: { type: integer }

    TranscriptResponse:
      type: object
      properties:
        recordingId: { type: string }
        userId: { type: string }
        fullText: { type: string }
        segments:
          type: array
          items: { $ref: "#/components/schemas/TranscriptSegment" }

    VocabularyWeakPoint:
      type: object
      properties:
        id: { type: integer, format: int64 }
        recordingId: { type: string }
        userId: { type: string }
        itemId: { type: string }
        label: { type: string }
        vocabularyType: { $ref: "#/components/schemas/VocabularyType" }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }
        masteryLevel: { type: number, format: double, nullable: true, description: "BKT mastery probability [0,1]; null until the Java engine has scored this item at least once" }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        scoreSource: { type: string, enum: [PYTHON_LEGACY, JAVA_ENGINE] }
        updatedAt: { type: string, format: date-time }

    GrammarWeakPoint:
      type: object
      properties:
        id: { type: integer, format: int64 }
        recordingId: { type: string }
        userId: { type: string }
        itemId: { type: string }
        label: { type: string }
        grammarType: { $ref: "#/components/schemas/GrammarType" }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }
        masteryLevel: { type: number, format: double, nullable: true, description: "BKT mastery probability [0,1]; null until the Java engine has scored this item at least once" }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        scoreSource: { type: string, enum: [PYTHON_LEGACY, JAVA_ENGINE] }
        updatedAt: { type: string, format: date-time }

    PronunciationWeakPoint:
      type: object
      properties:
        id: { type: integer, format: int64 }
        recordingId: { type: string }
        userId: { type: string }
        itemId: { type: string }
        label: { type: string }
        pronunciationType: { $ref: "#/components/schemas/PronunciationType" }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }
        masteryLevel: { type: number, format: double, nullable: true, description: "BKT mastery probability [0,1]; null until the Java engine has scored this item at least once" }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        scoreSource: { type: string, enum: [PYTHON_LEGACY, JAVA_ENGINE] }
        updatedAt: { type: string, format: date-time }

    ApiResponseTranscriptResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TranscriptResponse" }

    ApiResponseVocabularyWeakPointList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/VocabularyWeakPoint" }

    ApiResponseVocabularyWeakPointGrouped:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/VocabularyWeakPoint" }

    ApiResponseGrammarWeakPointList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/GrammarWeakPoint" }

    ApiResponseGrammarWeakPointGrouped:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/GrammarWeakPoint" }

    ApiResponsePronunciationWeakPointList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/PronunciationWeakPoint" }

    ApiResponsePronunciationWeakPointGrouped:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/PronunciationWeakPoint" }

    ApiResponseBase:
      type: object
      properties:
        success: { type: boolean }
        errorCode: { type: string, nullable: true }
        message: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

    ApiResponseError:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { nullable: true }

    ApiResponseVoid:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { nullable: true }

    PracticeAttemptRequest:
      type: object
      required: [itemId, category, label, correct]
      properties:
        itemId: { type: string }
        category: { type: string, description: "vocabulary, grammar or pronunciation" }
        label: { type: string }
        correct: { type: boolean }

    PracticeRedoRequest:
      type: object
      required: [userId, attempts]
      properties:
        userId: { type: string }
        attempts:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/PracticeAttemptRequest" }

    ReviewQueueItem:
      type: object
      properties:
        itemId: { type: string }
        category: { type: string, description: "vocabulary, grammar or pronunciation" }
        label: { type: string }
        lastWeakScore: { type: number, format: double, nullable: true }
        nextReviewAt: { type: string, format: date-time }

    ApiResponseReviewQueueItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/ReviewQueueItem" }

    DictationFacets:
      type: object
      properties:
        skills: { type: array, items: { type: string } }
        levels: { type: array, items: { type: string } }
        topics: { type: array, items: { type: string } }
        examTypes: { type: array, items: { type: string } }
        minListensForHint: { type: integer, description: "min listens (counted client-side, per sentence) before the FE reveals a hint" }

    DictationFolder:
      type: object
      description: One folder (topic grouping) in the dictation library.
      properties:
        folderId: { type: string }
        name: { type: string }
        lessonCount: { type: integer }

    DictationLessonSummary:
      type: object
      description: One lesson (clip) inside a folder; deliberately light - no scriptText/sentences.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        audioUrl: { type: string, description: "service-relative audio stream path" }

    DictationSentence:
      type: object
      properties:
        index: { type: integer }
        text: { type: string }
        startMs: { type: integer, nullable: true, description: "null if AI-alignment hasn't matched this sentence yet" }
        endMs: { type: integer, nullable: true, description: "null if AI-alignment hasn't matched this sentence yet" }
        translation: { type: string, nullable: true, description: "null if no translation was requested/generated" }

    DictationClipDetail:
      type: object
      description: >
        Full clip detail returned only when the learner opens it to practice sentence-by-sentence;
        unlike DictationLessonSummary/DictationClip, this carries the reference script.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        audioUrl: { type: string }
        scriptText: { type: string }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/DictationSentence" }

    DictationClip:
      type: object
      description: One library clip; omits the script text so the answer isn't leaked before grading.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        examType: { type: string }
        audioUrl: { type: string, description: "service-relative audio stream path" }

    StartDictationSessionRequest:
      type: object
      description: All facets optional; a null facet is unfiltered on that dimension.
      properties:
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        count: { type: integer, minimum: 1, default: 5 }

    DictationAttemptRequest:
      type: object
      required: [userId, userTranscript]
      description: >
        Exactly one of clipId / practiceItemId must be set. sentenceMistakes is only sent for
        sentence-mode library attempts (the FE forces a correct retype before letting the learner
        advance, so userTranscript itself ends up fully correct - sentenceMistakes is how the
        wrong attempts along the way still reach the miss/weak-point pipeline).
      properties:
        userId: { type: string }
        clipId: { type: integer, format: int64, nullable: true }
        practiceItemId: { type: integer, format: int64, nullable: true }
        userTranscript: { type: string }
        sentenceMistakes:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/DictationSentenceMistake" }

    DictationSentenceMistake:
      type: object
      required: [sentenceIndex, expectedText, attemptedText]
      description: One incorrect check on a single sentence during sentence-mode practice.
      properties:
        sentenceIndex: { type: integer, minimum: 0, description: "0-based position within the clip's sentences" }
        expectedText: { type: string }
        attemptedText: { type: string }

    WordDiff:
      type: object
      properties:
        tag: { type: string, enum: [CORRECT, SUBSTITUTED, MISSING, EXTRA] }
        actualWord: { type: string, nullable: true, description: "the learner's word for this slot; null for a MISSING slot" }
        expectedWord: { type: string, nullable: true, description: "the reference sentence's word for this slot; null for an EXTRA slot" }

    DictationAttemptResult:
      type: object
      properties:
        referenceText: { type: string }
        accuracy: { type: number, format: double, description: "1 - WER, clamped to [0, 1]" }
        wer: { type: number, format: double }
        diff:
          type: array
          items: { $ref: "#/components/schemas/WordDiff" }
        aiSuggestions: { type: array, items: { type: string }, description: "immediate AI study tips (Vietnamese)" }
        practiceSentences: { type: array, items: { type: string }, description: "AI practice sentences persisted for the AI section" }

    DictationHistoryEntry:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        clipId: { type: integer, format: int64, nullable: true }
        title: { type: string, nullable: true }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        attemptedAt: { type: string, format: date-time }
        attemptCount:
          type: integer
          nullable: true
          description: How many attempts (including this one) the learner has made on this clip; null for AI-practice entries.
        practiceType:
          type: string
          enum: [LIBRARY, AI_PRACTICE]
          description: LIBRARY when clipId is present, AI_PRACTICE otherwise - lets the UI badge each row.

    DictationMistake:
      type: object
      properties:
        expectedWord: { type: string, nullable: true }
        actualWord: { type: string, nullable: true }
        tag: { type: string, enum: [CORRECT, SUBSTITUTED, MISSING, EXTRA] }

    DictationAttemptDetail:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        title: { type: string, nullable: true }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        referenceText: { type: string }
        userTranscript: { type: string }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        mistakes:
          type: array
          items: { $ref: "#/components/schemas/DictationMistake" }
        aiSuggestions: { type: array, items: { type: string } }
        attemptedAt: { type: string, format: date-time }

    DictationPracticeItem:
      type: object
      properties:
        practiceItemId: { type: integer, format: int64 }
        audioUrl: { type: string, nullable: true, description: "null until Supertonic has synthesized the audio" }
        level: { type: string, nullable: true, description: "resolved CEFR level (A1-C1); null for items generated without an explicit facet selection, e.g. from a history attempt" }
        examType: { type: string, nullable: true, description: "resolved exam type (e.g. TOEIC); null for items generated without an explicit facet selection" }
        topic: { type: string, nullable: true, description: "short topic label the LLM assigned to the generated passage" }

    DictationPracticeItemDetail:
      type: object
      description: >
        Full AI-practice item detail returned only when the learner opens it to practice
        sentence-by-sentence; mirrors DictationClipDetail so the same runner drives both sections.
      properties:
        practiceItemId: { type: integer, format: int64 }
        audioUrl: { type: string, nullable: true }
        scriptText: { type: string }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/DictationSentence" }

    GenerateAiPracticeRequest:
      type: object
      description: >
        All fields optional. level/examType each accept a concrete value (e.g. "B1", "TOEIC"), the
        literal "RANDOM" (resolved server-side - level from a fixed CEFR pool A1/A2/B1/B2/C1,
        examType from the library's own distinct exam types, falling back to TOEIC/IELTS/TOEFL/
        General if the library has none), or omitted/blank (no preference, matching the
        pre-existing default behavior). translationLang is the learner's UI language; a translation
        is only generated when it's not "en".
      properties:
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        translationLang: { type: string, nullable: true }

    ApiResponseDictationFacets:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationFacets" }

    ApiResponseDictationClipList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationClip" }

    ApiResponseDictationFolderList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationFolder" }

    ApiResponseDictationLessonSummaryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationLessonSummary" }

    ApiResponseDictationClipDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationClipDetail" }

    ApiResponseDictationAttemptResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationAttemptResult" }

    ApiResponseDictationHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationHistoryEntry" }

    ApiResponseDictationAttemptDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationAttemptDetail" }

    ApiResponseDictationPracticeItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationPracticeItem" }

    ApiResponseDictationPracticeItemDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationPracticeItemDetail" }
