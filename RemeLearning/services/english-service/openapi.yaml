            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingLibrarySection"
        "403":
          description: Topic is locked for this learner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/learn/speaking/library/{userId}/sections/{sectionId}/sentences/{sentenceId}/attempts:
    post:
      tags: [Speaking Library]
      summary: Submit a learner's recorded attempt at one sentence (multipart audio); scores it via ai-service's wav2vec2 GOP model - does not itself affect topic gating
      operationId: submitSpeakingLibrarySentenceAttempt
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: sentenceId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio: { type: string, format: binary }
              required: [audio]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSentenceAttemptResult"
        "404":
          description: Section or sentence not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

  /api/v1/learn/speaking/library/{userId}/sections/{sectionId}/finish:
    post:
      tags: [Speaking Library]
      summary: Finish a section; if every sentence has a passing attempt, marks the topic PASSED and unlocks the next topic
      operationId: finishSpeakingLibrarySection
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseFinishSpeakingSection"

  /api/v1/learn/speaking/library/{userId}/sections/history:
    get:
      tags: [Speaking Library]
      summary: This learner's scored sentence attempts, across all topics
      operationId: getSpeakingLibraryHistory
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingLibraryAttemptList"

  /api/v1/learn/speaking/library/{userId}/sections/{sectionId}/ai-practice:
    post:
      tags: [Speaking Library]
      summary: >
        Generate AI practice targeted at this learner's own mispronunciations across every
        sentence attempt they've made on this section (the "Luyện tập với AI" action) - unions the
        weakPhonemesJson of every one of this learner's own attempts tied to the section (not just
        the latest, since speaking-library scores per sentence, not per section), generates a new
        sentence targeting those phonemes, and persists into the same speaking_practice_items bank
        the learn flow uses
      operationId: generateSpeakingPracticeFromSection
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: sectionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSpeakingPracticeItemList"
        "404":
          description: Section not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseError"

components:
  schemas:
    VocabularyType:
      type: string
      enum: [NOUN, VERB, ADJECTIVE, ADVERB, PHRASAL_VERB, COLLOCATION, IDIOM, OTHER]

    GrammarType:
      type: string
      enum: [TENSE, SUBJECT_VERB_AGREEMENT, ARTICLE, PREPOSITION, WORD_ORDER, PLURAL, PUNCTUATION, OTHER]

    PronunciationType:
      type: string
      enum: [VOWEL, CONSONANT, STRESS, INTONATION, LINKING, RHYTHM, OTHER]

    TranscriptSegment:
      type: object
      properties:
        id: { type: integer, format: int64 }
        transcriptId: { type: integer, format: int64 }
        speaker: { type: string }
        content: { type: string }
        startSeconds: { type: number, format: double }
        endSeconds: { type: number, format: double }
        segmentOrder: { type: integer }

    TranscriptResponse:
      type: object
      properties:
        recordingId: { type: string }
        userId: { type: string }
        fullText: { type: string }
        segments:
          type: array
          items: { $ref: "#/components/schemas/TranscriptSegment" }

    VocabularyWeakPoint:
      type: object
      properties:
        id: { type: integer, format: int64 }
        recordingId: { type: string }
        userId: { type: string }
        itemId: { type: string }
        label: { type: string }
        vocabularyType: { $ref: "#/components/schemas/VocabularyType" }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }
        masteryLevel: { type: number, format: double, nullable: true, description: "BKT mastery probability [0,1]; null until the Java engine has scored this item at least once" }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        scoreSource: { type: string, enum: [PYTHON_LEGACY, JAVA_ENGINE] }
        updatedAt: { type: string, format: date-time }

    GrammarWeakPoint:
      type: object
      properties:
        id: { type: integer, format: int64 }
        recordingId: { type: string }
        userId: { type: string }
        itemId: { type: string }
        label: { type: string }
        grammarType: { $ref: "#/components/schemas/GrammarType" }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }
        masteryLevel: { type: number, format: double, nullable: true, description: "BKT mastery probability [0,1]; null until the Java engine has scored this item at least once" }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        scoreSource: { type: string, enum: [PYTHON_LEGACY, JAVA_ENGINE] }
        updatedAt: { type: string, format: date-time }

    PronunciationWeakPoint:
      type: object
      properties:
        id: { type: integer, format: int64 }
        recordingId: { type: string }
        userId: { type: string }
        itemId: { type: string }
        label: { type: string }
        pronunciationType: { $ref: "#/components/schemas/PronunciationType" }
        forgettingScore: { type: number, format: double }
        recommendation: { type: string }
        masteryLevel: { type: number, format: double, nullable: true, description: "BKT mastery probability [0,1]; null until the Java engine has scored this item at least once" }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        scoreSource: { type: string, enum: [PYTHON_LEGACY, JAVA_ENGINE] }
        updatedAt: { type: string, format: date-time }

    ApiResponseTranscriptResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TranscriptResponse" }

    ApiResponseVocabularyWeakPointList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/VocabularyWeakPoint" }

    ApiResponseVocabularyWeakPointGrouped:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/VocabularyWeakPoint" }

    ApiResponseGrammarWeakPointList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/GrammarWeakPoint" }

    ApiResponseGrammarWeakPointGrouped:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/GrammarWeakPoint" }

    ApiResponsePronunciationWeakPointList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/PronunciationWeakPoint" }

    ApiResponsePronunciationWeakPointGrouped:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: array
                items: { $ref: "#/components/schemas/PronunciationWeakPoint" }

    ApiResponseBase:
      type: object
      properties:
        success: { type: boolean }
        errorCode: { type: string, nullable: true }
        message: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

    ApiResponseError:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { nullable: true }

    ApiResponseVoid:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { nullable: true }

    PracticeAttemptRequest:
      type: object
      required: [itemId, category, label, correct]
      properties:
        itemId: { type: string }
        category: { type: string, description: "vocabulary, grammar or pronunciation" }
        label: { type: string }
        correct: { type: boolean }

    PracticeRedoRequest:
      type: object
      required: [userId, attempts]
      properties:
        userId: { type: string }
        attempts:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/PracticeAttemptRequest" }

    ReviewQueueItem:
      type: object
      properties:
        itemId: { type: string }
        category: { type: string, description: "vocabulary, grammar or pronunciation" }
        label: { type: string }
        lastWeakScore: { type: number, format: double, nullable: true }
        nextReviewAt: { type: string, format: date-time }

    ApiResponseReviewQueueItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/ReviewQueueItem" }

    DictationFacets:
      type: object
      properties:
        skills: { type: array, items: { type: string } }
        levels: { type: array, items: { type: string } }
        topics: { type: array, items: { type: string } }
        examTypes: { type: array, items: { type: string } }
        minListensForHint: { type: integer, description: "min listens (counted client-side, per sentence) before the FE reveals a hint" }

    DictationFolder:
      type: object
      description: One folder (topic grouping) in the dictation library.
      properties:
        folderId: { type: string }
        name: { type: string }
        lessonCount: { type: integer }

    DictationLessonSummary:
      type: object
      description: >
        One lesson (clip) inside a folder; deliberately light - no scriptText/sentences. sentenceCount
        stands in for a duration estimate (no audio-length data is stored). attemptCount/latestAccuracy
        are the requesting learner's own progress on this clip, null when never attempted.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        audioUrl: { type: string, description: "service-relative audio stream path" }
        level: { type: string, nullable: true, description: "CEFR level (A1..C2), null if untagged" }
        sentenceCount: { type: integer, description: "number of sentences in the script" }
        attemptCount: { type: integer, nullable: true, description: "null if the learner has never attempted this clip" }
        latestAccuracy: { type: number, format: double, nullable: true, description: "0..1 accuracy of the learner's most recent attempt; null if never attempted" }

    DictationSentence:
      type: object
      properties:
        index: { type: integer }
        text: { type: string }
        startMs: { type: integer, nullable: true, description: "null if AI-alignment hasn't matched this sentence yet" }
        endMs: { type: integer, nullable: true, description: "null if AI-alignment hasn't matched this sentence yet" }
        translation: { type: string, nullable: true, description: "null if no translation was requested/generated" }

    DictationClipDetail:
      type: object
      description: >
        Full clip detail returned only when the learner opens it to practice sentence-by-sentence;
        unlike DictationLessonSummary/DictationClip, this carries the reference script.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        audioUrl: { type: string }
        scriptText: { type: string }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/DictationSentence" }

    DictationClip:
      type: object
      description: One library clip; omits the script text so the answer isn't leaked before grading.
      properties:
        clipId: { type: integer, format: int64 }
        code: { type: string }
        title: { type: string }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        examType: { type: string }
        audioUrl: { type: string, description: "service-relative audio stream path" }

    StartDictationSessionRequest:
      type: object
      description: All facets optional; a null facet is unfiltered on that dimension.
      properties:
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        count: { type: integer, minimum: 1, default: 5 }

    DictationAttemptRequest:
      type: object
      required: [userId, userTranscript]
      description: >
        Exactly one of clipId / practiceItemId must be set. sentenceMistakes is only sent for
        sentence-mode library attempts (the FE forces a correct retype before letting the learner
        advance, so userTranscript itself ends up fully correct - sentenceMistakes is how the
        wrong attempts along the way still reach the miss/weak-point pipeline).
      properties:
        userId: { type: string }
        clipId: { type: integer, format: int64, nullable: true }
        practiceItemId: { type: integer, format: int64, nullable: true }
        userTranscript: { type: string }
        sentenceMistakes:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/DictationSentenceMistake" }

    DictationSentenceMistake:
      type: object
      required: [sentenceIndex, expectedText, attemptedText]
      description: One incorrect check on a single sentence during sentence-mode practice.
      properties:
        sentenceIndex: { type: integer, minimum: 0, description: "0-based position within the clip's sentences" }
        expectedText: { type: string }
        attemptedText: { type: string }

    WordDiff:
      type: object
      properties:
        tag: { type: string, enum: [CORRECT, SUBSTITUTED, MISSING, EXTRA] }
        actualWord: { type: string, nullable: true, description: "the learner's word for this slot; null for a MISSING slot" }
        expectedWord: { type: string, nullable: true, description: "the reference sentence's word for this slot; null for an EXTRA slot" }

    DictationErrorCategory:
      type: string
      enum: [LEXICON, GRAMMAR, PHONOLOGY]
      description: >
        Root-cause classification for one dictation mistake: LEXICON (vocabulary/homophone/
        collocation/slang), GRAMMAR (dropped inflection, wrong tense, unrecognized structure), or
        PHONOLOGY (elision/linking/assimilation/weak forms of function words in connected speech).

    DictationErrorEntry:
      type: object
      description: One row of the mistake-comparison table, root-classified.
      properties:
        original: { type: string, nullable: true }
        transcribed: { type: string, nullable: true }
        category: { $ref: "#/components/schemas/DictationErrorCategory" }
        note: { type: string, nullable: true, description: "short note on why this was likely misheard/mistyped" }

    DictationRootCauseGroup:
      type: object
      description: A root-cause explanation for one category, only present when it has misses.
      properties:
        category: { $ref: "#/components/schemas/DictationErrorCategory" }
        summary: { type: string }
        examples: { type: array, items: { type: string } }

    DictationAttemptResult:
      type: object
      properties:
        referenceText: { type: string }
        accuracy: { type: number, format: double, description: "1 - WER, clamped to [0, 1]" }
        wer: { type: number, format: double }
        diff:
          type: array
          items: { $ref: "#/components/schemas/WordDiff" }
        errorTable:
          type: array
          items: { $ref: "#/components/schemas/DictationErrorEntry" }
        rootCauses:
          type: array
          items: { $ref: "#/components/schemas/DictationRootCauseGroup" }
        actionAdvice: { type: array, items: { type: string }, description: "immediate AI study tips (Vietnamese)" }
        practiceSentences: { type: array, items: { type: string }, description: "AI practice sentences persisted for the AI section" }

    DictationHistoryEntry:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        clipId: { type: integer, format: int64, nullable: true }
        title: { type: string, nullable: true }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        attemptedAt: { type: string, format: date-time }
        attemptCount:
          type: integer
          nullable: true
          description: How many attempts (including this one) the learner has made on this clip; null for AI-practice entries.
        practiceType:
          type: string
          enum: [LIBRARY, AI_PRACTICE]
          description: LIBRARY when clipId is present, AI_PRACTICE otherwise - lets the UI badge each row.

    DictationMistake:
      type: object
      properties:
        expectedWord: { type: string, nullable: true }
        actualWord: { type: string, nullable: true }
        tag: { type: string, enum: [CORRECT, SUBSTITUTED, MISSING, EXTRA] }

    DictationAttemptDetail:
      type: object
      properties:
        attemptId: { type: integer, format: int64 }
        title: { type: string, nullable: true }
        skill: { type: string, nullable: true }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        referenceText: { type: string }
        userTranscript: { type: string }
        accuracy: { type: number, format: double }
        wer: { type: number, format: double }
        mistakes:
          type: array
          items: { $ref: "#/components/schemas/DictationMistake" }
        errorTable:
          type: array
          items: { $ref: "#/components/schemas/DictationErrorEntry" }
        rootCauses:
          type: array
          items: { $ref: "#/components/schemas/DictationRootCauseGroup" }
        actionAdvice: { type: array, items: { type: string } }
        attemptedAt: { type: string, format: date-time }

    DictationPracticeItem:
      type: object
      properties:
        practiceItemId: { type: integer, format: int64 }
        audioUrl: { type: string, nullable: true, description: "null until Supertonic has synthesized the audio" }
        level: { type: string, nullable: true, description: "resolved CEFR level (A1-C1); null for items generated without an explicit facet selection, e.g. from a history attempt" }
        examType: { type: string, nullable: true, description: "resolved exam type (e.g. TOEIC); null for items generated without an explicit facet selection" }
        topic: { type: string, nullable: true, description: "short topic label the LLM assigned to the generated passage" }

    DictationPracticeItemDetail:
      type: object
      description: >
        Full AI-practice item detail returned only when the learner opens it to practice
        sentence-by-sentence; mirrors DictationClipDetail so the same runner drives both sections.
      properties:
        practiceItemId: { type: integer, format: int64 }
        audioUrl: { type: string, nullable: true }
        scriptText: { type: string }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/DictationSentence" }

    GenerateAiPracticeRequest:
      type: object
      description: >
        All fields optional. level/examType each accept a concrete value (e.g. "B1", "TOEIC"), the
        literal "RANDOM" (resolved server-side - level from a fixed CEFR pool A1/A2/B1/B2/C1,
        examType from the library's own distinct exam types, falling back to TOEIC/IELTS/TOEFL/
        General if the library has none), or omitted/blank (no preference, matching the
        pre-existing default behavior). translationLang is the learner's UI language; a translation
        is only generated when it's not "en".
      properties:
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        translationLang: { type: string, nullable: true }

    ApiResponseDictationFacets:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationFacets" }

    ApiResponseDictationClipList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationClip" }

    ApiResponseDictationFolderList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationFolder" }

    ApiResponseDictationLessonSummaryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationLessonSummary" }

    ApiResponseDictationClipDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationClipDetail" }

    ApiResponseDictationAttemptResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationAttemptResult" }

    ApiResponseDictationHistoryEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationHistoryEntry" }

    ApiResponseDictationAttemptDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationAttemptDetail" }

    ApiResponseDictationPracticeItemList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/DictationPracticeItem" }

    ApiResponseDictationPracticeItemDetail:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/DictationPracticeItemDetail" }

    VocabQuestionType:
      type: string
      enum: [CLOZE, MCQ, MATCHING]

    GrammarQuestionType:
      type: string
      enum: [ERROR_CORRECTION, FILL_TENSE, TRANSFORM, MCQ]

    ListeningQuestionType:
      type: string
      enum: [MCQ, KEYWORD, OPEN]

    GenerateVocabPracticeRequest:
      type: object
      description: >
        All fields optional; when focusItems is empty/omitted the service falls back to the
        learner's own top vocabulary weak points, then to a generic level-appropriate set if the
        learner has none yet.
      properties:
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        focusItems: { type: array, nullable: true, items: { type: string } }

    VocabQuestion:
      type: object
      description: >
        Practice-time question shape. Now carries the correct answer + translation so the client can
        grade each answer locally for instant feedback; the authoritative score still comes from the
        submit endpoint. Mirrors the server-side ExactMatchScorer rule.
      properties:
        index: { type: integer }
        prompt: { type: string }
        type: { $ref: "#/components/schemas/VocabQuestionType" }
        options: { type: array, nullable: true, items: { type: string } }
        answer: { type: string, description: "Correct answer, for client-side grading (mirrors VocabAttemptScorer)." }
        translation: { type: string, nullable: true }

    VocabPracticeItem:
      type: object
      properties:
        practiceItemId: { type: integer, format: int64 }
        level: { type: string, nullable: true }
        examType: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        targetWords: { type: array, items: { type: string } }
        questions:
          type: array
          items: { $ref: "#/components/schemas/VocabQuestion" }
        createdAt: { type: string, format: date-time }

    SubmitVocabAttemptRequest:
      type: object
      required: [userId, practiceItemId, answers]
      description: Submitted answers, aligned by index to the practice item's questions.
      properties:
        userId: { type: string }
        practiceItemId: { type: integer, format: int64 }
        answers:
          type: array
          minItems: 1
          items: { type: string }

    VocabAttemptQuestionResult:
      type: object
      description: One graded question, revealed after submission (unlike VocabQuestion, includes the answer).
      properties:
        index: { type: integer }
