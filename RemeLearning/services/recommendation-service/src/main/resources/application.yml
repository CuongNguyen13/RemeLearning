spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: recommendation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?currentSchema=reme_recommendation}
    username: ${DB_USERNAME:postgres.oaltfczuectbznkuywfm}
    password: ${DB_PASSWORD:Remelearning123!}
    schema: ${DB_SCHEMA:reme_recommendation}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: ${DB_SCHEMA:reme_recommendation}
    create-schemas: true

server:
  port: 8086

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

reme:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-minutes: 60
  s3:
    region: ${S3_REGION:ap-southeast-1}
    endpoint: ${S3_ENDPOINT:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
  llm:
    provider: ${LLM_PROVIDER:gemini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
    ollama:
      model: ${OLLAMA_MODEL:deepseek-v4-flash:cloud}
    zen:
      api-key: ${ZEN_API_KEY:}
      model: ${ZEN_MODEL:big-pickle}

recommendation:
  exercise-generator:
    mode: ${EXERCISE_GENERATOR_MODE:rule-based}   # rule-based | llm
